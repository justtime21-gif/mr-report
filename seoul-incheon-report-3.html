<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서울/인천파트 일일보고</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --accent: #1f6feb;
    --accent2: #388bfd;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --text: #e6edf3;
    --text2: #8b949e;
    --text3: #484f58;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 16px;
  }

  .container { max-width: 680px; margin: 0 auto; }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 12px;
  }
  .header-left { display: flex; flex-direction: column; }
  .header-title { font-size: 15px; font-weight: 700; color: var(--text); }
  .header-date { font-size: 12px; color: var(--text2); margin-top: 2px; font-family: 'JetBrains Mono', monospace; }
  .header-badge {
    background: var(--accent);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }

  /* Tab */
  .tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
  }
  .tab {
    flex: 1;
    padding: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    border-radius: 8px;
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* Panel */
  .panel { display: none; }
  .panel.active { display: block; }

  /* Section */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 10px;
  }
  .section-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  /* Member row */
  .member-row {
    display: grid;
    grid-template-columns: 64px 1fr 1fr 1fr;
    gap: 8px;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .member-row:last-child { border-bottom: none; padding-bottom: 0; }
  .member-row:first-child { padding-top: 0; }
  .member-name { font-size: 13px; font-weight: 700; color: var(--text); }
  .member-name.me { color: var(--accent2); }

  .input-group { display: flex; flex-direction: column; gap: 3px; }
  .input-label { font-size: 10px; color: var(--text3); }
  .mini-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    padding: 6px 8px;
    width: 100%;
    outline: none;
    transition: border-color 0.15s;
  }
  .mini-input:focus { border-color: var(--accent); }
  .mini-input[readonly] { opacity: 0.5; cursor: not-allowed; }

  /* Summary row */
  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-top: 4px;
  }
  .summary-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    text-align: center;
  }
  .summary-value {
    font-size: 22px;
    font-weight: 900;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent2);
  }
  .summary-label { font-size: 10px; color: var(--text2); margin-top: 3px; }

  /* Cumulative table */
  .cum-table { width: 100%; border-collapse: collapse; }
  .cum-table th {
    font-size: 10px;
    color: var(--text3);
    text-align: right;
    padding: 4px 6px;
    font-weight: 500;
  }
  .cum-table th:first-child { text-align: left; }
  .cum-table td {
    font-size: 13px;
    padding: 8px 6px;
    border-top: 1px solid var(--border);
    text-align: right;
    font-family: 'JetBrains Mono', monospace;
  }
  .cum-table td:first-child { text-align: left; font-family: 'Noto Sans KR', sans-serif; font-weight: 700; }
  .cum-table tr:first-child td { border-top: none; }

  .rate-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    justify-content: flex-end;
  }
  .bar-bg {
    width: 60px;
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.5s ease;
  }
  .rate-text { font-size: 12px; min-width: 36px; text-align: right; }

  /* Buttons */
  .btn {
    display: block;
    width: 100%;
    padding: 13px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    margin-bottom: 8px;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); }
  .btn-green { background: var(--green); color: #fff; }
  .btn-green:hover { opacity: 0.85; }

  /* Output box */
  .output-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    font-size: 13px;
    line-height: 1.9;
    white-space: pre-wrap;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text);
    margin-top: 10px;
    min-height: 60px;
  }

  /* Vision upload */
  .vision-area {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s;
    position: relative;
  }
  .vision-area:hover { border-color: var(--accent); }
  .vision-area.dragover { border-color: var(--accent2); background: rgba(31,111,235,0.06); }
  .vision-icon { font-size: 28px; margin-bottom: 8px; }
  .vision-text { font-size: 13px; color: var(--text2); }
  .vision-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }
  #visionInput { display: none; }

  .preview-img { max-width: 100%; border-radius: 8px; margin-top: 10px; display: none; }

  /* Alert */
  .alert {
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 12px;
    margin-top: 8px;
    display: none;
  }
  .alert-info { background: rgba(31,111,235,0.12); border: 1px solid var(--accent); color: var(--accent2); }
  .alert-success { background: rgba(63,185,80,0.12); border: 1px solid var(--green); color: var(--green); }
  .alert-error { background: rgba(248,81,73,0.12); border: 1px solid var(--red); color: var(--red); }

  /* Weekly panel */
  .week-day {
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .week-day:hover { border-color: var(--accent); }
  .week-day-header { display: flex; justify-content: space-between; align-items: center; }
  .week-day-date { font-size: 13px; font-weight: 700; }
  .week-day-total { font-size: 13px; font-family: 'JetBrains Mono', monospace; color: var(--accent2); }
  .week-day-detail { font-size: 11px; color: var(--text2); margin-top: 4px; display: none; }
  .week-day.open .week-day-detail { display: block; }

  .api-key-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }
  .api-key-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    padding: 8px 12px;
    outline: none;
  }
  .api-key-input:focus { border-color: var(--accent); }
  .btn-small {
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    border: none;
    background: var(--accent);
    color: #fff;
    white-space: nowrap;
  }

  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .cum-input-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .cum-input-row:last-child { border-bottom: none; }
  .cum-input-name { font-size: 13px; font-weight: 700; width: 70px; }
  .cum-input-field {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    padding: 7px 10px;
    outline: none;
  }
  .cum-input-field:focus { border-color: var(--accent); }
  .cum-unit { font-size: 12px; color: var(--text2); }

  .divider { height: 1px; background: var(--border); margin: 12px 0; }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="header-title">서울/인천파트 일일보고</div>
      <div class="header-date" id="todayDate"></div>
    </div>
    <div class="header-badge">MR팀</div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('daily')">📋 일일입력</button>
    <button class="tab" onclick="switchTab('vision')">📝 텍스트입력</button>
    <button class="tab" onclick="switchTab('weekly')">📊 주간누적</button>
    <button class="tab" onclick="switchTab('settings')">⚙️ 설정</button>
  </div>

  <!-- ===== DAILY PANEL ===== -->
  <div class="panel active" id="panel-daily">

    <div class="section">
      <div class="section-title">팀원별 실적 입력</div>
      <div style="display:grid; grid-template-columns: 64px 1fr 1fr 1fr; gap:8px; margin-bottom:6px;">
        <div></div>
        <div class="input-group"><div class="input-label" style="font-size:10px;color:var(--text3);">신규</div></div>
        <div class="input-group"><div class="input-label" style="font-size:10px;color:var(--text3);">증대</div></div>
        <div class="input-group"><div class="input-label" style="font-size:10px;color:var(--text3);">매출(만원)</div></div>
      </div>
      <div id="memberRows"></div>
    </div>

    <div class="section">
      <div class="section-title">오늘 합계</div>
      <div class="summary-grid">
        <div class="summary-card">
          <div class="summary-value" id="totalNew">0</div>
          <div class="summary-label">총 신규</div>
        </div>
        <div class="summary-card">
          <div class="summary-value" id="totalGrowth">0</div>
          <div class="summary-label">총 증대</div>
        </div>
        <div class="summary-card">
          <div class="summary-value" id="totalSales">0</div>
          <div class="summary-label">총 매출합(만)</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">4월 누적 현황</div>
      <table class="cum-table">
        <thead>
          <tr>
            <th>이름</th>
            <th>누적(만)</th>
            <th>목표</th>
            <th>달성률</th>
          </tr>
        </thead>
        <tbody id="cumTableBody"></tbody>
      </table>
      <div class="divider"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text2);">
        <span>팀 누적 합계</span>
        <span style="font-family:'JetBrains Mono';font-weight:700;color:var(--accent2);" id="teamTotalCum">0만</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text2);margin-top:6px;">
        <span>팀 목표 합계</span>
        <span style="font-family:'JetBrains Mono';font-weight:700;" id="teamTotalGoal">0만</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text2);margin-top:6px;">
        <span>팀 달성률</span>
        <span style="font-family:'JetBrains Mono';font-weight:700;color:var(--green);" id="teamRate">0%</span>
      </div>
    </div>

    <button class="btn btn-primary" onclick="generateReport()">📋 보고 문자 생성</button>
    <button class="btn btn-green" onclick="saveToday()">💾 오늘 기록 저장</button>
    <div class="output-box" id="reportOutput" style="display:none;"></div>
    <button class="btn btn-secondary" id="copyBtn" style="display:none;" onclick="copyReport()">📋 복사하기</button>
  </div>

  <!-- ===== VISION PANEL ===== -->
  <div class="panel" id="panel-vision">
    <div class="section">
      <div class="section-title">카톡 텍스트 붙여넣기</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:10px;">카톡 보고 내용을 그대로 복사해서 붙여넣으세요</div>
      <textarea id="kakaoText" placeholder="정구윤&#10;신규 1 증대 0&#10;매출합 15만원&#10;&#10;김무영&#10;신규 0 증대 1&#10;매출합 8만원" style="width:100%;height:180px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:'Noto Sans KR',sans-serif;padding:10px;outline:none;resize:vertical;line-height:1.7;"></textarea>
      <div class="alert" id="textStatus" style="margin-top:8px;"></div>
    </div>

    <button class="btn btn-primary" onclick="parseText()">🔍 자동 파싱</button>

    <div class="section" id="parsedSection" style="display:none;">
      <div class="section-title">파싱 결과 확인 및 수정</div>
      <div id="parsedRows"></div>
      <button class="btn btn-green" style="margin-top:10px;" onclick="applyParsed()">✅ 일일입력에 적용</button>
    </div>
  </div>

  <!-- ===== WEEKLY PANEL ===== -->
  <div class="panel" id="panel-weekly">
    <div class="section">
      <div class="section-title">이번 주 누적 (04/07 ~ 04/13)</div>
      <div id="weeklyList"></div>
    </div>

    <div class="section">
      <div class="section-title">주간 합계</div>
      <div class="summary-grid">
        <div class="summary-card">
          <div class="summary-value" id="weekTotalNew">0</div>
          <div class="summary-label">주간 신규</div>
        </div>
        <div class="summary-card">
          <div class="summary-value" id="weekTotalGrowth">0</div>
          <div class="summary-label">주간 증대</div>
        </div>
        <div class="summary-card">
          <div class="summary-value" id="weekTotalSales">0</div>
          <div class="summary-label">주간 매출합(만)</div>
        </div>
      </div>
    </div>

    <button class="btn btn-primary" onclick="generateWeeklyReport()">📋 주간 보고 문자 생성</button>
    <div class="output-box" id="weeklyOutput" style="display:none;"></div>
    <button class="btn btn-secondary" id="weekCopyBtn" style="display:none;" onclick="copyWeekly()">📋 복사하기</button>
  </div>

  <!-- ===== SETTINGS PANEL ===== -->
  <div class="panel" id="panel-settings">
    <div class="section">
      <div class="section-title">4월 누적매출 초기값 설정</div>
      <div id="initCumRows"></div>
      <button class="btn btn-primary" style="margin-top:12px;" onclick="saveInitCum()">💾 저장</button>
      <div class="alert alert-success" id="initCumAlert" style="margin-top:6px;">✓ 저장되었습니다</div>
    </div>

    <div class="section">
      <div class="section-title">팀 목표 설정 (만원)</div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span style="font-size:13px;color:var(--text2);">개인 목표</span>
        <input type="number" class="mini-input" id="goalInput" value="200" style="width:100px;">
        <span style="font-size:12px;color:var(--text2);">만원</span>
      </div>
      <button class="btn btn-secondary" style="margin-top:10px;" onclick="saveGoal()">저장</button>
    </div>

    <div class="section">
      <div class="section-title">데이터 초기화</div>
      <button class="btn btn-secondary" onclick="clearWeekly()" style="color:var(--red);border-color:var(--red);">🗑 이번 주 기록 초기화</button>
    </div>
  </div>

</div>

<script>
// ============ STATE ============
const MEMBERS = ['성진욱','정구윤','김무영','이의주'];
const ME = '성진욱';
const GOAL_DEFAULT = 200;

const STATE_KEY = 'mrState_v1';
const DEFAULT_STATE = {
  apiKey: '',
  goalPerPerson: GOAL_DEFAULT,
  initCum: { '성진욱': 186, '정구윤': 246, '김무영': 35, '이의주': 1 },
  dailyRecords: {},
};

function getState() {
  try {
    const saved = localStorage.getItem(STATE_KEY);
    if (!saved) return JSON.parse(JSON.stringify(DEFAULT_STATE));
    return Object.assign({}, DEFAULT_STATE, JSON.parse(saved));
  } catch(e) { return JSON.parse(JSON.stringify(DEFAULT_STATE)); }
}
function setState(s) {
  try { localStorage.setItem(STATE_KEY, JSON.stringify(s)); } catch(e) {}
}

function getTodayKey() {
  const d = new Date();
  return d.toISOString().slice(0,10);
}

// 누적 = initCum + sum of dailyRecords for this month
function getCumSales(member) {
  const s = getState();
  let base = (s.initCum[member] || 0);
  const today = getTodayKey();
  const monthPrefix = today.slice(0,7); // '2026-04'
  Object.entries(s.dailyRecords).forEach(([date, rec]) => {
    if (date.startsWith(monthPrefix) && rec[member]) {
      base += (rec[member].sales || 0);
    }
  });
  return base;
}

// ============ INIT ============
window.onload = () => {
  setTodayDate();
  renderMemberRows();
  renderInitCumRows();
  loadApiKey();
  refreshCumTable();
  refreshWeekly();

};

function setTodayDate() {
  const d = new Date();
  const days = ['일','월','화','수','목','금','토'];
  document.getElementById('todayDate').textContent =
    `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} (${days[d.getDay()]})`;
}

// ============ TABS ============
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('panel-'+tab).classList.add('active');
  if (tab === 'weekly') refreshWeekly();
}

// ============ MEMBER ROWS ============
function renderMemberRows() {
  const s = getState();
  const today = getTodayKey();
  const todayRec = s.dailyRecords[today] || {};
  const container = document.getElementById('memberRows');
  container.innerHTML = '';
  MEMBERS.forEach(name => {
    const isMe = name === ME;
    const rec = todayRec[name] || { new: 0, growth: 0, sales: 0 };
    const row = document.createElement('div');
    row.className = 'member-row';
    row.innerHTML = `
      <div class="member-name${isMe?' me':''}">${name}${isMe?'<br><span style="font-size:9px;color:var(--text3);">수동</span>':''}</div>
      <div class="input-group">
        <input class="mini-input" type="number" min="0" value="${rec.new||0}"
          onchange="updateDaily('${name}','new',this.value)" ${isMe?'':'readonly'} data-member="${name}" data-field="new">
      </div>
      <div class="input-group">
        <input class="mini-input" type="number" min="0" value="${rec.growth||0}"
          onchange="updateDaily('${name}','growth',this.value)" ${isMe?'':'readonly'} data-member="${name}" data-field="growth">
      </div>
      <div class="input-group">
        <input class="mini-input" type="number" min="0" value="${rec.sales||0}"
          onchange="updateDaily('${name}','sales',this.value)" ${isMe?'':'readonly'} data-member="${name}" data-field="sales">
      </div>
    `;
    container.appendChild(row);
  });
  recalcSummary();
}

function updateDaily(member, field, val) {
  const s = getState();
  const today = getTodayKey();
  if (!s.dailyRecords[today]) s.dailyRecords[today] = {};
  if (!s.dailyRecords[today][member]) s.dailyRecords[today][member] = { new:0, growth:0, sales:0 };
  s.dailyRecords[today][member][field] = parseInt(val)||0;
  setState(s);
  recalcSummary();
  refreshCumTable();
}

function recalcSummary() {
  const s = getState();
  const today = getTodayKey();
  const rec = s.dailyRecords[today] || {};
  let tn=0, tg=0, ts=0;
  MEMBERS.forEach(m => {
    const r = rec[m] || {};
    tn += r.new||0; tg += r.growth||0; ts += r.sales||0;
  });
  document.getElementById('totalNew').textContent = tn;
  document.getElementById('totalGrowth').textContent = tg;
  document.getElementById('totalSales').textContent = ts;
}

// ============ CUM TABLE ============
function refreshCumTable() {
  const s = getState();
  const goal = s.goalPerPerson || GOAL_DEFAULT;
  const tbody = document.getElementById('cumTableBody');
  tbody.innerHTML = '';
  let totalCum = 0, totalGoal = 0;
  MEMBERS.forEach(m => {
    const cum = getCumSales(m);
    const rate = Math.round(cum / goal * 100);
    totalCum += cum; totalGoal += goal;
    const color = rate >= 100 ? 'var(--green)' : rate >= 50 ? 'var(--yellow)' : 'var(--red)';
    const fill = Math.min(rate, 100);
    tbody.innerHTML += `
      <tr>
        <td>${m}</td>
        <td>${cum}만</td>
        <td>${goal}만</td>
        <td>
          <div class="rate-bar">
            <div class="bar-bg"><div class="bar-fill" style="width:${fill}%;background:${color};"></div></div>
            <span class="rate-text" style="color:${color};">${rate}%</span>
          </div>
        </td>
      </tr>
    `;
  });
  const teamRate = Math.round(totalCum / totalGoal * 100);
  document.getElementById('teamTotalCum').textContent = totalCum + '만';
  document.getElementById('teamTotalGoal').textContent = totalGoal + '만';
  document.getElementById('teamRate').textContent = teamRate + '%';
}

// ============ GENERATE REPORT ============
function generateReport() {
  const s = getState();
  const today = getTodayKey();
  const rec = s.dailyRecords[today] || {};
  const goal = s.goalPerPerson || GOAL_DEFAULT;
  const d = new Date();
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');

  let lines = [`서울/인천파트 일일보고 (${mm}/${dd})\n`];
  let tn=0, tg=0, ts=0;
  MEMBERS.forEach(m => {
    const r = rec[m] || { new:0, growth:0, sales:0 };
    tn+=r.new; tg+=r.growth; ts+=r.sales;
    const salesStr = String(r.sales).padStart(2,'0');
    lines.push(`${m} \n신규 ${r.new} 증대 ${r.growth}\n매출합 ${salesStr}만원\n`);
  });
  lines.push(`총 신규 ${tn} 증대 ${tg}`);
  lines.push(`총 매출합 ${ts}만원\n`);
  lines.push(`*04월 누적 매출`);
  lines.push(`목표 ${goal * MEMBERS.length}만`);
  let cumLines = [];
  MEMBERS.forEach(m => {
    const cum = getCumSales(m);
    const rate = Math.round(cum / goal * 100);
    cumLines.push(`${m} ${cum}만/ ${rate}%`);
  });
  // team total
  const totalCum = MEMBERS.reduce((a,m) => a+getCumSales(m), 0);
  const totalGoal = goal * MEMBERS.length;
  const teamRate = Math.round(totalCum/totalGoal*100);
  lines.push(`누적매출: ${totalCum}만 / ${teamRate}%`);
  lines = lines.concat(cumLines);

  const out = lines.join('\n');
  const box = document.getElementById('reportOutput');
  box.textContent = out;
  box.style.display = 'block';
  document.getElementById('copyBtn').style.display = 'block';
}

function copyText(text, btnEl, label) {
  const done = () => { btnEl.textContent = '✅ 복사됨!'; setTimeout(() => btnEl.textContent = label, 1500); };
  const fallback = () => {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;';
    document.body.appendChild(ta); ta.focus(); ta.select();
    try { document.execCommand('copy'); done(); } catch(e) { alert('길게 눌러서 직접 복사해주세요.'); }
    document.body.removeChild(ta);
  };
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(done).catch(fallback);
  } else { fallback(); }
}
function copyReport() {
  copyText(document.getElementById('reportOutput').textContent, document.getElementById('copyBtn'), '📋 복사하기');
}

// ============ WEEKLY ============
function refreshWeekly() {
  const s = getState();
  const today = new Date();
  // get this week Mon~Sun
  const dayOfWeek = today.getDay(); // 0=Sun
  const mondayOffset = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
  const monday = new Date(today);
  monday.setDate(today.getDate() + mondayOffset);

  const weekDates = [];
  for (let i=0;i<7;i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate()+i);
    weekDates.push(d.toISOString().slice(0,10));
  }

  const dayNames = ['(월)','(화)','(수)','(목)','(금)','(토)','(일)'];
  const container = document.getElementById('weeklyList');
  container.innerHTML = '';
  let tn=0,tg=0,ts=0;
  const todayKey = getTodayKey();

  weekDates.forEach((date, idx) => {
    const rec = s.dailyRecords[date];
    if (!rec && date > todayKey) return;
    const label = date.slice(5).replace('-','/') + ' ' + dayNames[idx];
    let dn=0,dg=0,ds=0;
    if (rec) MEMBERS.forEach(m => {
      dn += rec[m]?.new||0; dg += rec[m]?.growth||0; ds += rec[m]?.sales||0;
    });
    tn+=dn; tg+=dg; ts+=ds;

    const el = document.createElement('div');
    el.className = 'week-day';
    el.innerHTML = `
      <div class="week-day-header" onclick="this.parentElement.classList.toggle('open')">
        <span class="week-day-date">${label}</span>
        <span class="week-day-total">${rec ? ds+'만' : '-'}</span>
      </div>
      <div class="week-day-detail">${rec ? MEMBERS.map(m => {
        const r = rec[m]||{new:0,growth:0,sales:0};
        return `${m}: 신규${r.new} 증대${r.growth} ${r.sales}만`;
      }).join(' | ') : '기록 없음'}</div>
    `;
    container.appendChild(el);
  });

  document.getElementById('weekTotalNew').textContent = tn;
  document.getElementById('weekTotalGrowth').textContent = tg;
  document.getElementById('weekTotalSales').textContent = ts;
}

function generateWeeklyReport() {
  const s = getState();
  const today = new Date();
  const todayKey = getTodayKey();
  const dayOfWeek = today.getDay();
  const mondayOffset = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
  const monday = new Date(today);
  monday.setDate(today.getDate() + mondayOffset);
  const weekDates = [];
  for(let i=0;i<7;i++){
    const d=new Date(monday); d.setDate(monday.getDate()+i);
    weekDates.push(d.toISOString().slice(0,10));
  }
  const goal = s.goalPerPerson||GOAL_DEFAULT;
  let tn=0,tg=0,ts=0;
  const memberWeek = {};
  const memberToday = {};
  MEMBERS.forEach(m => { memberWeek[m]={new:0,growth:0,sales:0}; memberToday[m]={new:0,growth:0}; });

  weekDates.forEach(date => {
    const rec = s.dailyRecords[date];
    if(!rec) return;
    MEMBERS.forEach(m => {
      const r = rec[m]||{};
      memberWeek[m].new += r.new||0;
      memberWeek[m].growth += r.growth||0;
      memberWeek[m].sales += r.sales||0;
      tn+=r.new||0; tg+=r.growth||0; ts+=r.sales||0;
      // 오늘 데이터
      if(date === todayKey) {
        memberToday[m].new = r.new||0;
        memberToday[m].growth = r.growth||0;
      }
    });
  });

  const mm = String(today.getMonth()+1).padStart(2,'0');
  const dd = String(today.getDate()).padStart(2,'0');
  const monthNum = today.getMonth()+1;
  let lines = ['서울/인천파트 주간보고 (~' + mm + '/' + dd + ')\n'];
  MEMBERS.forEach(m => {
    const r = memberWeek[m];
    const t = memberToday[m];
    lines.push(m + '\n금일 신규 ' + t.new + ' 증대 ' + t.growth + '\n주간 신규 ' + r.new + ' 증대 ' + r.growth + '\n주간 매출합 ' + r.sales + '만원\n');
  });
  lines.push('주간 합계: 신규 ' + tn + ' 증대 ' + tg + ' 매출 ' + ts + '만원\n');
  lines.push('*' + String(monthNum).padStart(2,'0') + '월 누적 매출');
  lines.push('목표 ' + (goal*MEMBERS.length) + '만');
  const totalCum = MEMBERS.reduce((a,m)=>a+getCumSales(m),0);
  const totalGoal = goal*MEMBERS.length;
  lines.push('누적매출: ' + totalCum + '만 / ' + Math.round(totalCum/totalGoal*100) + '%');
  MEMBERS.forEach(m => {
    const cum = getCumSales(m);
    lines.push(m + ' ' + cum + '만/ ' + Math.round(cum/goal*100) + '%');
  });
  const out = lines.join('\n');
  const box = document.getElementById('weeklyOutput');
  box.textContent = out; box.style.display='block';
  document.getElementById('weekCopyBtn').style.display='block';
}

function copyWeekly() {
  copyText(document.getElementById('weeklyOutput').textContent, document.getElementById('weekCopyBtn'), '📋 복사하기');
}

function clearWeekly() {
  if(!confirm('이번 주 기록을 모두 삭제할까요?')) return;
  const s = getState();
  const today = new Date();
  const dayOfWeek = today.getDay();
  const mondayOffset = dayOfWeek===0?-6:1-dayOfWeek;
  const monday = new Date(today); monday.setDate(today.getDate()+mondayOffset);
  for(let i=0;i<7;i++){
    const d=new Date(monday); d.setDate(monday.getDate()+i);
    delete s.dailyRecords[d.toISOString().slice(0,10)];
  }
  setState(s);
  renderMemberRows();
  refreshCumTable();
  refreshWeekly();
}

// ============ TEXT PARSE ============
function showTextStatus(msg, type) {
  type = type || 'info';
  var el = document.getElementById('textStatus');
  el.className = 'alert alert-' + type;
  el.textContent = msg;
  el.style.display = 'block';
}

function parseText() {
  var raw = document.getElementById('kakaoText').value.trim();
  if (!raw) { showTextStatus('텍스트를 붙여넣어 주세요.', 'error'); return; }

  var results = [];
  var nonMe = MEMBERS.filter(function(m){ return m !== ME; });

  nonMe.forEach(function(name) {
    var nameIdx = raw.indexOf(name);
    if (nameIdx === -1) return;

    // 이름 블록부터 300자 추출
    var block = raw.slice(nameIdx, nameIdx + 300);

    // 신규: "신규처 : 1선" or "신규처:1선" or "신규 1"
    var mNew = block.match(/신규[처\s]*[:：]?\s*(\d+)/);
    // 증대: "처방증대 : 0선" or "증대 0"
    var mGrowth = block.match(/증대\s*[:：]?\s*(\d+)/);
    // 매출: "예상매출 :30,000원" or "매출합 15만원"
    var mSales = null;
    // 만원 형식
    var mMan = block.match(/매출[합처예상\s]*[:：]?\s*(\d+)만/);
    // 원 형식 (예: 30,000원)
    var mWon = block.match(/매출[합처예상\s]*[:：]?\s*([\d,]+)원/);

    var salesVal = 0;
    if (mMan) {
      salesVal = parseInt(mMan[1]);
    } else if (mWon) {
      var won = parseInt(mWon[1].replace(/,/g, ''));
      salesVal = Math.round(won / 10000); // 원 → 만원 변환
    }

    results.push({
      name: name,
      new: mNew ? parseInt(mNew[1]) : 0,
      growth: mGrowth ? parseInt(mGrowth[1]) : 0,
      sales: salesVal
    });
  });

  if (results.length === 0) {
    showTextStatus('❌ 인식된 팀원이 없어요. 이름이 포함된 텍스트를 붙여넣어 주세요.', 'error');
    return;
  }
  showTextStatus('✓ ' + results.length + '명 인식 완료! 확인 후 적용하세요.', 'success');
  renderParsedRows(results);
}


function renderParsedRows(members) {
  const section = document.getElementById('parsedSection');
  const container = document.getElementById('parsedRows');
  container.innerHTML = '';
  members.forEach(m => {
    container.innerHTML += `
      <div class="member-row">
        <div class="member-name">${m.name}</div>
        <div class="input-group">
          <div class="input-label">신규</div>
          <input class="mini-input" type="number" id="p_new_${m.name}" value="${m.new||0}">
        </div>
        <div class="input-group">
          <div class="input-label">증대</div>
          <input class="mini-input" type="number" id="p_growth_${m.name}" value="${m.growth||0}">
        </div>
        <div class="input-group">
          <div class="input-label">매출</div>
          <input class="mini-input" type="number" id="p_sales_${m.name}" value="${m.sales||0}">
        </div>
      </div>
    `;
  });
  section.style.display='block';
  window._parsedMembers = members.map(m=>m.name);
}

function applyParsed() {
  const s = getState();
  const today = getTodayKey();
  if(!s.dailyRecords[today]) s.dailyRecords[today]={};
  (window._parsedMembers||[]).forEach(name => {
    if(name === ME) return; // 나는 수동
    s.dailyRecords[today][name] = {
      new: parseInt(document.getElementById('p_new_'+name)?.value)||0,
      growth: parseInt(document.getElementById('p_growth_'+name)?.value)||0,
      sales: parseInt(document.getElementById('p_sales_'+name)?.value)||0,
    };
  });
  setState(s);
  renderMemberRows();
  refreshCumTable();
  showStatus('✅ 일일입력 탭에 적용되었습니다!', 'success');
}
